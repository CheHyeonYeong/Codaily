<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codaily Rankings</title>
    <style>
        :root {
            --bg: #f2efe6;
            --panel: #fffdf8;
            --line: #d7d0c4;
            --ink: #22201c;
            --muted: #746d64;
            --accent: #9a3412;
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at top right, #f7dfc2 0, transparent 28%),
                linear-gradient(180deg, #f4efe6 0%, #ede4d7 100%);
            font-family: "Segoe UI", "Noto Sans KR", sans-serif;
            color: var(--ink);
        }

        main {
            max-width: 980px;
            margin: 0 auto;
            padding: 40px 20px 72px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 18px 48px rgba(34, 32, 28, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(28px, 4vw, 46px);
        }

        p {
            margin: 0 0 22px;
            color: var(--muted);
            line-height: 1.6;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 14px 10px;
            border-bottom: 1px solid #ebe3d6;
        }

        th {
            font-size: 13px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
<main>
    <section class="panel">
        <h1>회고 랭킹</h1>
        <p>공유된 회고 중 조회수가 높은 항목을 보여준다. 현재 기본 캐시는 메모리 캐시이며, 이후 Redis로 바로 전환할 수 있다.</p>

        <table>
            <thead>
            <tr>
                <th>제목</th>
                <th>저장소</th>
                <th>조회수</th>
                <th>링크</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(items)}">
                <td colspan="4">아직 생성된 회고가 없습니다.</td>
            </tr>
            <tr th:each="item : ${items}">
                <td th:text="${item.title}">title</td>
                <td th:text="${item.repoFullName}">repo</td>
                <td th:text="${item.viewCount}">0</td>
                <td><a th:href="@{/retrospects/{id}(id=${item.id})}">열기</a></td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
