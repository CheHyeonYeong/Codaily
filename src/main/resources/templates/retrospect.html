<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${retrospect.title}">Retrospect</title>
    <style>
        :root {
            --bg: #f4efe7;
            --paper: #fffdfa;
            --line: #d6d0c5;
            --ink: #22201c;
            --muted: #726b62;
            --accent: #14532d;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "Noto Sans KR", sans-serif;
            background: linear-gradient(180deg, #f4efe7 0%, #efe7dc 100%);
            color: var(--ink);
        }

        main {
            max-width: 880px;
            margin: 0 auto;
            padding: 40px 20px 72px;
        }

        article {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 18px 48px rgba(34, 32, 28, 0.08);
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(28px, 4vw, 44px);
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 22px;
            color: var(--muted);
            font-size: 14px;
        }

        .share {
            display: inline-block;
            margin-bottom: 24px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        pre {
            margin: 0;
            padding: 20px;
            border-radius: 18px;
            background: #f7f3eb;
            border: 1px solid #e5ddd0;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.7;
            font-family: "Cascadia Code", Consolas, monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
<main>
    <article>
        <h1 th:text="${retrospect.title}">Retrospect</h1>
        <div class="meta">
            <span th:text="'저장소: ' + ${retrospect.repoFullName}">저장소</span>
            <span th:text="'조회수: ' + ${retrospect.viewCount}">조회수</span>
            <span th:text="'생성일: ' + ${retrospect.createdAt}">생성일</span>
        </div>
        <a class="share" th:href="${retrospect.shareUrl}" th:text="${retrospect.shareUrl}">share</a>
        <pre th:text="${retrospect.markdown}">markdown</pre>
    </article>
</main>
</body>
</html>
